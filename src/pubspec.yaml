name: book_review
description: Voli di Carta - App per recensire i libri letti
publish_to: 'none'
version: 1.3.13+26

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.5+4
  path_provider: ^2.1.3
  path: ^1.9.0
  crypto: ^3.0.3
  http: ^1.2.1
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.5.0
  url_launcher: ^6.3.1
  share_plus: ^10.0.0
  package_info_plus: ^8.0.0
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A5276"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
